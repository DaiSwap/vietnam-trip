<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://server.arcgisonline.com https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://*.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com wss://*.firebaseio.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Results · mY'sTory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="results">

<section class="section center" style="padding-bottom:0">
  <div class="wrap">
    <div class="tag reveal">The group decides</div>
    <h2 class="reveal">Live results.</h2>
    <p class="sub reveal">Ranked by what everyone wants most — two points for a Yes, one for a Maybe. Updates the moment anyone votes.</p>
    <div class="res-meta reveal" aria-live="polite" aria-atomic="true"><span class="dot-live" aria-hidden="true"></span> <span><b id="voterCount">0</b> people have voted so far</span></div>
  </div>
</section>

<section class="section" style="padding-top:18px">
  <div class="wrap">
    <div class="res-list" id="results"></div>
  </div>
</section>

<section class="section" style="padding-top:18px;padding-bottom:40px">
  <div class="wrap">
    <div id="trip-story" class="trip-story reveal" data-mode="group" aria-live="polite"></div>
  </div>
</section>

<div class="foot">
  Haven't voted yet? Head to <a href="places.html" style="color:var(--accent);font-weight:600">Places</a> or open the <a href="map.html" style="color:var(--accent);font-weight:600">map</a>.
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
